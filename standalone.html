<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hapi — Happy News from Around the World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFBF5; --bg-card: #fff; --text: #1C1610; --muted: #6B5E4E;
      --border: #EDE3D6; --r: 14px; --shadow: 0 2px 16px rgba(0,0,0,.07);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
      --serif: 'Fraunces', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    /* ── Header ── */
    .app-header {
      height: 70px; background: linear-gradient(135deg,#FF6B35 0%,#E94F8B 50%,#FFB700 100%);
      box-shadow: 0 2px 20px rgba(255,107,53,.3); position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto; padding: 0 2rem; height: 100%;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .header-brand { display: flex; align-items: center; gap: .75rem; }
    .header-logo { font-size: 2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
    .header-title { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; color: #fff; letter-spacing: -.02em; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .header-sub { font-size: .78rem; color: rgba(255,255,255,.88); margin-top: 2px; font-weight: 500; }
    .header-badge {
      display: flex; align-items: center; gap: 6px; font-size: .78rem;
      color: rgba(255,255,255,.9); background: rgba(255,255,255,.15);
      padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.25); white-space: nowrap;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #7FFF7A; box-shadow: 0 0 6px #7FFF7A; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    /* ── Main ── */
    .app-main { flex: 1; max-width: 1400px; width: 100%; margin: 0 auto; padding: 1.5rem 2rem; }
    /* ── Layout ── */
    .content-layout { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    .content-layout.panel-open { grid-template-columns: 1fr 420px; }
    /* ── Map section ── */
    .map-section {
      background: var(--bg-card); border-radius: var(--r); border: 1px solid var(--border);
      box-shadow: var(--shadow); padding: 1.25rem 1.25rem .75rem; overflow: hidden;
    }
    .map-prompt {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      font-size: .9rem; color: var(--muted); background: linear-gradient(90deg,#FF6B3508,#FFB70008,#E94F8B08);
      border: 1px dashed var(--border); border-radius: 8px; padding: .6rem 1rem; margin-bottom: .75rem;
    }
    /* ── SVG map ── */
    #world-map { width: 100%; height: auto; cursor: default; display: block; }
    .country { transition: filter .15s; }
    .country:hover { filter: brightness(1.15); }
    /* ── Tooltip ── */
    #tooltip {
      position: fixed; z-index: 200; padding: 5px 12px; border-radius: 20px; color: #fff;
      font-size: .78rem; font-weight: 600; pointer-events: none; box-shadow: 0 2px 10px rgba(0,0,0,.2);
      transform: translateY(-50%); white-space: nowrap; display: none;
    }
    /* ── Legend ── */
    .map-legend { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: .75rem .5rem .25rem; }
    .legend-chip {
      font-size: .72rem; font-weight: 600; padding: 4px 10px; border-radius: 20px;
      border: 1.5px solid; cursor: pointer; transition: all .2s; font-family: var(--sans); letter-spacing: .01em;
    }
    .legend-chip:hover,.legend-chip.active { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,.15); }
    /* ── Panel ── */
    .panel-section { animation: slideIn .35s cubic-bezier(.22,1,.36,1); }
    @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
    .region-panel {
      background: var(--bg-card); border-radius: var(--r); border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); overflow: hidden; position: sticky; top: 86px;
      max-height: calc(100vh - 100px); overflow-y: auto;
    }
    .panel-header { padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--border); }
    .panel-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .75rem; }
    .panel-emoji { font-size: 2rem; display: block; margin-bottom: .25rem; }
    .panel-region-name { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; line-height: 1.1; letter-spacing: -.02em; }
    .panel-tagline { font-size: .82rem; color: var(--muted); margin-top: 4px; font-style: italic; }
    .panel-close {
      background: none; border: 1.5px solid; border-radius: 8px; width: 32px; height: 32px;
      cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; opacity: .6;
    }
    .panel-close:hover { opacity: 1; transform: scale(1.05); }
    .panel-badge {
      display: inline-flex; align-items: center; gap: 4px; color: #fff;
      font-size: .75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: .02em;
    }
    /* ── Story cards ── */
    .panel-stories { padding: 1rem; display: flex; flex-direction: column; gap: .75rem; }
    .story-card {
      display: flex; gap: .75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; transition: transform .2s, box-shadow .2s;
    }
    .story-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .story-accent { width: 4px; flex-shrink: 0; }
    .story-body { padding: .85rem .85rem .85rem 0; display: flex; flex-direction: column; gap: .4rem; flex: 1; }
    .story-title { font-family: var(--serif); font-size: .95rem; font-weight: 600; line-height: 1.35; color: var(--text); }
    .story-summary { font-size: .8rem; color: var(--muted); line-height: 1.5; }
    .story-footer { display: flex; align-items: center; justify-content: space-between; gap: .5rem; margin-top: .25rem; flex-wrap: wrap; }
    .story-source { font-size: .68rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; border: 1px solid; letter-spacing: .02em; }
    .story-link { font-size: .75rem; font-weight: 600; text-decoration: none; letter-spacing: .01em; transition: opacity .15s; }
    .story-link:hover { opacity: .7; text-decoration: underline; }
    .story-date { font-size: .68rem; color: var(--muted); opacity: .75; white-space: nowrap; }
    /* ── Pull date tabs ── */
    .pull-tabs { display: flex; gap: 6px; padding: .65rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .pull-tab { font-size: .72rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; color: var(--muted); transition: all .2s; font-family: var(--sans); letter-spacing: .01em; }
    .pull-tab:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    /* ── Footer ── */
    .app-footer {
      text-align: center; padding: 1.25rem 2rem; font-size: .78rem; color: var(--muted);
      border-top: 1px solid var(--border); background: var(--bg-card); margin-top: auto;
    }
    /* ── Loading ── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: var(--muted); }
    /* ── Responsive ── */
    @media (max-width: 900px) {
      .content-layout.panel-open { grid-template-columns: 1fr; }
      .region-panel { position: static; max-height: none; }
      .header-sub { display: none; }
    }
    @media (max-width: 600px) {
      .app-main { padding: 1rem; } .header-badge { display: none; }
      .legend-chip { font-size: .65rem; padding: 3px 8px; }
    }
    /* ── Auth ── */
    .header-auth { display: flex; align-items: center; gap: .6rem; margin-left: .5rem; }
    .sign-in-btn {
      display: flex; align-items: center; gap: .45rem;
      background: rgba(255,255,255,.2); color: #fff;
      border: 1.5px solid rgba(255,255,255,.4); border-radius: 20px;
      padding: 6px 14px; font-size: .78rem; font-weight: 600;
      cursor: pointer; font-family: var(--sans); transition: all .2s; white-space: nowrap;
    }
    .sign-in-btn:hover { background: rgba(255,255,255,.32); transform: translateY(-1px); }
    .user-info { display: flex; align-items: center; gap: .5rem; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5); object-fit: cover; }
    .user-name { font-size: .78rem; font-weight: 600; color: #fff; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sign-out-link { font-size: .7rem; color: rgba(255,255,255,.7); background: none; border: none; cursor: pointer; font-family: var(--sans); text-decoration: underline; padding: 0; }
    .sign-out-link:hover { color: #fff; }
    /* ── Vote button ── */
    .vote-btn {
      display: inline-flex; align-items: center; gap: 3px;
      background: none; border: 1.5px solid var(--border); border-radius: 20px;
      padding: 2px 9px; font-size: .72rem; font-weight: 600; cursor: pointer;
      color: var(--muted); font-family: var(--sans); transition: all .2s; white-space: nowrap;
    }
    .vote-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-logo">🌍</span>

        <div class="header-title">Hapi</div>

          <path fill="#fff" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
          <path fill="#fff" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo@3/dist/d3-geo.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE — authentication + vote storage
   ═══════════════════════════════════════════════════════════ */
firebase.initializeApp({
  apiKey: "AIzaSyDe_MbrNt2nbHkZ3edQbvkS4pOe82sjjUg",
  authDomain: "hapi-44ae0.firebaseapp.com",
  projectId: "hapi-44ae0",
  storageBucket: "hapi-44ae0.firebasestorage.app",
  messagingSenderId: "125368740551",
  appId: "1:125368740551:web:5ef13e666949d53da8ace2",
  measurementId: "G-JKSDLRYHNH"
});
const auth = firebase.auth();
const db   = firebase.firestore();

window.currentUser = null;
window.VOTES       = {};  // storyKey → { count, myVote }
window.STORIES_MAP = {};  // storyKey → { title, url }

auth.onAuthStateChanged(user => {
  window.currentUser = user;
  const signInBtn = document.getElementById('sign-in-btn');
  const userInfo  = document.getElementById('user-info');
  if (user) {
    signInBtn.style.display = 'none';
    userInfo.style.display  = 'flex';
    document.getElementById('user-avatar').src       = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName || user.email || '';
    // Reload votes so ♥ state reflects the now-logged-in user
    if (window._panelCtx) loadVotesForStories(window._panelCtx.stories, window._panelCtx.pullDate);
  } else {
    signInBtn.style.display = 'flex';
    userInfo.style.display  = 'none';
    Object.keys(window.VOTES).forEach(k => { window.VOTES[k] = { ...window.VOTES[k], myVote: false }; });
    updateVoteButtons();
  }
});

function signInWithGoogle() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(err => console.error('Sign-in error:', err));
}

function signOutUser() {
  auth.signOut();
}

async function loadVotesForStories(stories, pullDate) {
  window._panelCtx = { stories, pullDate };
  const uid = window.currentUser?.uid;
  await Promise.all(stories.map(async s => {
    const key = `${pullDate}_${s.id}`;
    window.STORIES_MAP[key] = { title: s.title, url: s.url };
    try {
      const snap = await db.collection('votes').doc(key).get();
      if (snap.exists) {
        const d = snap.data();
        window.VOTES[key] = { count: d.count || 0, myVote: uid ? !!(d.voters?.[uid]) : false };
      } else {
        window.VOTES[key] = { count: 0, myVote: false };
      }
    } catch { window.VOTES[key] = { count: 0, myVote: false }; }
  }));
  updateVoteButtons();
}

async function toggleVote(key) {
  if (!window.currentUser) {
    // Flash the sign-in button as a nudge
    const btn = document.getElementById('sign-in-btn');
    if (btn) { btn.style.background = 'rgba(255,255,255,.45)'; setTimeout(() => btn.style.background = '', 400); }
    return;
  }
  const uid    = window.currentUser.uid;
  const story  = window.STORIES_MAP[key] || {};
  const prev   = window.VOTES[key] || { count: 0, myVote: false };
  const adding = !prev.myVote;

  // Optimistic update
  window.VOTES[key] = { count: prev.count + (adding ? 1 : -1), myVote: adding };
  updateVoteButtons();

  const ref = db.collection('votes').doc(key);
  try {
    await db.runTransaction(async t => {
      const snap = await t.get(ref);
      if (!snap.exists) {
        if (adding) t.set(ref, { title: story.title || '', url: story.url || '', count: 1, voters: { [uid]: true } });
      } else {
        const d = snap.data();
        const hasVote = !!(d.voters?.[uid]);
        if (adding && !hasVote) {
          t.update(ref, { count: firebase.firestore.FieldValue.increment(1), [`voters.${uid}`]: true });
        } else if (!adding && hasVote) {
          t.update(ref, { count: firebase.firestore.FieldValue.increment(-1), [`voters.${uid}`]: firebase.firestore.FieldValue.delete() });
        }
      }
    });
  } catch (err) {
    console.error('Vote error:', err);
    window.VOTES[key] = prev; // revert optimistic update
    updateVoteButtons();
  }
}

function updateVoteButtons() {
  document.querySelectorAll('.vote-btn[data-key]').forEach(btn => {
    const v   = window.VOTES[btn.dataset.key] || { count: 0, myVote: false };
    const col = btn.dataset.color;
    btn.querySelector('.vote-count').textContent = v.count > 0 ? v.count : '';
    btn.style.cssText = v.myVote ? `background:${col};border-color:${col};color:#fff` : '';
    btn.title = window.currentUser ? (v.myVote ? 'Remove vote' : 'Upvote this story') : 'Sign in to vote';
  });
}

/* ═══════════════════════════════════════════════════════════
   STORIES DATA — loaded from stories.json at runtime
   ═══════════════════════════════════════════════════════════ */
async function fetchStories() {
  const mapSection = document.getElementById('map-section');
  const loadingEl = document.createElement('div');
  loadingEl.id = 'stories-loading';
  loadingEl.style.cssText = 'text-align:center;padding:1.5rem;color:var(--muted);font-size:.9rem;';
  loadingEl.textContent = '✨ Loading happy stories…';
  mapSection.prepend(loadingEl);

  try {
    const res = await fetch('./stories.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    window.STORIES_DATA = await res.json();
  } catch (err) {
    loadingEl.style.color = '#E94F8B';
    loadingEl.textContent = '⚠️ Could not load stories. Please refresh the page or check your connection.';
    console.error('fetchStories error:', err);
    throw err;
  } finally {
    loadingEl.remove();
  }
}

  780:"North America",784:"Asia",788:"Africa",792:"Asia",795:"Asia",

};

/* ═══════════════════════════════════════════════════════════
   APP STATE
   ═══════════════════════════════════════════════════════════ */
let selectedContinent = null;
let hoveredContinent = null;
let selectedPullIndex = 0;

/* ═══════════════════════════════════════════════════════════
   MAP RENDERING
   ═══════════════════════════════════════════════════════════ */
async function initMap() {
  const W = 960, H = 500;
  const svg = document.getElementById('world-map');

  const projection = d3.geoNaturalEarth1()
    .scale(153)
    .translate([W / 2, H / 2]);

  const pathGen = d3.geoPath().projection(projection);

  // Graticule (grid lines)
  const graticule = d3.geoGraticule()();
  const gratPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  gratPath.setAttribute('d', pathGen(graticule));
  gratPath.setAttribute('fill', 'none');
  gratPath.setAttribute('stroke', '#E8D9C8');
  gratPath.setAttribute('stroke-width', '0.3');
  svg.appendChild(gratPath);

  // World sphere (background)
  const sphere = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  sphere.setAttribute('d', pathGen({type: 'Sphere'}));
  sphere.setAttribute('fill', '#F0EBE3');
  sphere.setAttribute('stroke', '#DDD3C8');
  sphere.setAttribute('stroke-width', '0.5');
  svg.insertBefore(sphere, svg.firstChild);

  // Load world atlas
  const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
  const countries = topojson.feature(world, world.objects.countries);

  const tooltip = document.getElementById('tooltip');
  const countryPaths = [];

  countries.features.forEach(geo => {
    const id = +geo.id;
    const continent = NUMERIC_TO_CONTINENT[id];
    const color = continent ? CONTINENT_COLORS[continent] : null;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathGen(geo));
    path.setAttribute('stroke', '#fff');
    path.setAttribute('stroke-width', '0.4');
    path.setAttribute('stroke-linejoin', 'round');
    path.classList.add('country');
    path._continent = continent;
    path._baseColor = color;

    if (continent) path.style.cursor = 'pointer';

    path.addEventListener('mouseenter', (e) => {
      if (!continent) return;
      hoveredContinent = continent;
      updateColors();
      tooltip.textContent = continent;
      tooltip.style.background = CONTINENT_COLORS[continent];
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY) + 'px';
    });

    path.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY) + 'px';
    });

    path.addEventListener('mouseleave', () => {
      hoveredContinent = null;
      updateColors();
      tooltip.style.display = 'none';
    });

    path.addEventListener('click', () => {
      if (!continent) return;
      selectedContinent = selectedContinent === continent ? null : continent;
      updateColors();
      renderPanel();
      const prompt = document.getElementById('map-prompt');
      if (prompt) prompt.style.display = selectedContinent ? 'none' : 'flex';
    });

    svg.appendChild(path);
    countryPaths.push(path);
  });

  window._countryPaths = countryPaths;
  updateColors();
}

function updateColors() {
  if (!window._countryPaths) return;
  window._countryPaths.forEach(path => {
    const continent = path._continent;
    const base = path._baseColor;
    let fill = '#DDD3C8';

    if (base && continent) {
      if (selectedContinent) {
        fill = continent === selectedContinent ? base : '#DDD3C8';
      } else if (hoveredContinent) {
        fill = continent === hoveredContinent ? base : base + '55';
      } else {
        fill = base + 'CC';
      }
    }
    path.setAttribute('fill', fill);
  });
}

/* ═══════════════════════════════════════════════════════════
   PANEL RENDERING
   ═══════════════════════════════════════════════════════════ */
function renderPanel() {
  const panel = document.getElementById('panel-section');
  const layout = document.getElementById('content-layout');

  if (!selectedContinent) {
    panel.style.display = 'none';
    layout.classList.remove('panel-open');
    return;
  }

  const pull = window.STORIES_DATA.pulls[selectedPullIndex];
  const data = pull.regions[selectedContinent];
  if (!data) return;

  const { emoji, color, tagline, stories } = data;

  const pullTabsHtml = window.STORIES_DATA.pulls.length > 1 ? `
    <div class="pull-tabs">
      ${window.STORIES_DATA.pulls.map((p, i) => `
        <button class="pull-tab" style="${i === selectedPullIndex
          ? `background:${color};color:#fff;border-color:${color}`
          : ''}" onclick="switchPull(${i})">${formatDate(p.date)}</button>
      `).join('')}
    </div>
  ` : '';

  const storyCards = stories.map(s => {
    const key = `${pull.date}_${s.id}`;
    const v   = window.VOTES[key] || { count: 0, myVote: false };
    const voteStyle = v.myVote ? `background:${color};border-color:${color};color:#fff` : '';
    return `
    <article class="story-card">
      <div class="story-accent" style="background:${color}"></div>
      <div class="story-body">
        <div class="story-title">${escHtml(s.title)}</div>
        <div class="story-summary">${escHtml(s.summary)}</div>
        <div class="story-footer">
          <span class="story-source" style="color:${color};border-color:${color}44;background:${color}11">${escHtml(s.source)}</span>
          ${s.date ? `<span class="story-date">📅 ${formatDate(s.date)}</span>` : ''}
          <button class="vote-btn" data-key="${key}" data-color="${color}" onclick="toggleVote('${key}')" style="${voteStyle}" title="${window.currentUser ? (v.myVote ? 'Remove vote' : 'Upvote this story') : 'Sign in to vote'}">♥ <span class="vote-count">${v.count > 0 ? v.count : ''}</span></button>
          <a class="story-link" href="${s.url}" target="_blank" rel="noopener" style="color:${color}">Read more →</a>
        </div>
      </div>
    </article>
  `;}).join('');

  panel.innerHTML = `
    <div class="region-panel">
      <div class="panel-header" style="background:linear-gradient(135deg,${color}22,${color}08);border-bottom-color:${color}33">
        <div class="panel-title-row">
          <div>
            <span class="panel-emoji">${emoji}</span>
            <div class="panel-region-name" style="color:${color}">${escHtml(selectedContinent)}</div>
            <div class="panel-tagline">${escHtml(tagline)}</div>
          </div>
          <button class="panel-close" onclick="closePanel()" style="color:${color};border-color:${color}44">✕</button>
        </div>
        <span class="panel-badge" style="background:${color}">✨ 3 happy stories today</span>
      </div>
      ${pullTabsHtml}
      <div class="panel-stories">${storyCards}</div>
    </div>
  `;

  panel.style.display = 'block';
  layout.classList.add('panel-open');
  // Trigger slide-in animation
  panel.classList.remove('panel-section');
  void panel.offsetWidth;
  panel.classList.add('panel-section');

  // Load live vote counts (async — updates buttons when ready)
  loadVotesForStories(stories, pull.date);
}

function closePanel() {
  selectedContinent = null;
  updateColors();
  renderPanel();
  const prompt = document.getElementById('map-prompt');
  if (prompt) prompt.style.display = 'flex';
}

function switchPull(index) {
  selectedPullIndex = index;
  renderPanel();
}

/* ═══════════════════════════════════════════════════════════
   LEGEND
   ═══════════════════════════════════════════════════════════ */
function renderLegend() {
  const legend = document.getElementById('map-legend');
  legend.innerHTML = Object.entries(CONTINENT_COLORS).map(([continent, color]) => `
    <button
      class="legend-chip"
      id="chip-${continent.replace(/\s/g,'_')}"
      style="background:${color}22;color:#333;border-color:${color}"
      onclick="selectFromLegend('${continent}')"
    >${continent}</button>
  `).join('');
}

function selectFromLegend(continent) {
  selectedContinent = selectedContinent === continent ? null : continent;
  updateColors();
  renderPanel();
  const prompt = document.getElementById('map-prompt');
  if (prompt) prompt.style.display = selectedContinent ? 'none' : 'flex';
  // Update chip styles
  document.querySelectorAll('.legend-chip').forEach(chip => {
    const c = chip.textContent.trim();
    const col = CONTINENT_COLORS[c];
    if (c === selectedContinent) {
      chip.style.background = col;
      chip.style.color = '#fff';
      chip.classList.add('active');
    } else {
      chip.style.background = col + '22';
      chip.style.color = '#333';
      chip.classList.remove('active');
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════ */
function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m - 1]} ${d}, ${y}`;
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
(async () => {
  // Fetch stories first — map and panel depend on this data
  try {
    await fetchStories();
  } catch (err) {
    // fetchStories already shows an error message; abort init
    return;
  }

  // Update date badge
  const dateEl = document.getElementById('update-date');
  if (window.STORIES_DATA.pulls && window.STORIES_DATA.pulls.length) {
    dateEl.textContent = 'Updated ' + formatDate(window.STORIES_DATA.pulls[0].date);
  }

  renderLegend();

  try {
    await initMap();
  } catch (err) {
    document.getElementById('map-section').innerHTML +=
      '<p style="text-align:center;color:#E94F8B;padding:1rem">Map failed to load. Please check your internet connection and refresh.</p>';
  }
})();
</script>
